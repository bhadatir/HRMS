<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body style="font-family: sans-serif; line-height: 1.6; color: #333;">
<div style="border: 1px solid #ddd; padding: 20px; border-radius: 8px;">
    <h2 style="color: #2c3e50;"><span th:text="${subject}">Subject</span></h2>

    <p><strong>Plan Name:</strong> <span th:text="${planName}">Name</span></p>
    <p><strong>Start Date:</strong> <span th:text="${startDate}">Date</span></p>
    <p><strong>Details:</strong> <span th:text="${details}">Details</span></p>
    <p th:if="${status}"><strong>Status:</strong> <span th:text="${status}">Status</span></p>

    <div style="margin: 5px 0;">
        <a th:href="${link}"
           style="color: #757575; cursor: pointer; text-decoration: underline;"
           onclick="event.stopPropagation();"
           onmouseover="this.style.color='#808080'; this.style.fontWeight='bold';"
           onmouseout="this.style.color='#757575'; this.style.fontWeight='normal';">
            View Travel Plan
        </a>
    </div>

    <hr style="border: 0; border-top: 1px solid #eee;">
    <p style="font-size: 0.8em; color: #888;">
        Sent on: <span th:text="${currentDate}">Date</span> at <span th:text="${currentTime}">Time</span>
    </p>
</div>
</body>
</html>
